version: 2
updates:
- package-ecosystem: mix
  directory: "/"
  schedule:
    interval: weekly
  cooldown:
    default-days: 7
  open-pull-requests-limit: 10
  groups:
    mix-minor:
    update-types:
      - "patch"
      - "minor"
- package-ecosystem: npm
  directory: "/assets"
  schedule:
    interval: weekly
  cooldown:
    default-days: 7
  open-pull-requests-limit: 10
  groups:
    npm-minor:
      update-types:
        - "patch"
        - "minor"
